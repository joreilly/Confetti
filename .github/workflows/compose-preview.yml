name: Compose Preview

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: compose-preview-${{ github.event.pull_request.number || 'baselines' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          lfs: 'true'

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Warm Gradle wrapper
        run: ./gradlew help

      - uses: yschimke/compose-ai-tools/.github/actions/apply@v0.11.9
        with:
          cli-version: catalog
          catalog-key: composeai-preview
          a11y-module: wearApp
          notifications-module: androidApp
